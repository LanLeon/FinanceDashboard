<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>

    <!-- Custom Styles (Basic Minimalist) -->
    <link rel="stylesheet" href="styles.css">

    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="app">
        <!-- Navigation -->
        <header>
            <h1>FinanceTracker</h1>
            <nav>
                <a href="#" @click.prevent="currentView = 'dashboard'" :class="{ active: currentView === 'dashboard' }">Dashboard</a>
                <a href="#" @click.prevent="currentView = 'transactions'" :class="{ active: currentView === 'transactions' }">Transactions</a>
                <a href="#" @click.prevent="currentView = 'budgets'" :class="{ active: currentView === 'budgets' }">Budgets</a>
                <button @click="showExportModal = true" title="Export Data">💾 Export</button>
            </nav>
        </header>

        <!-- Main Content Area -->
        <main>
            <!-- Dashboard View -->
            <div v-if="currentView === 'dashboard'">
                <dashboard-view></dashboard-view>
            </div>

            <!-- Transactions View -->
            <div v-if="currentView === 'transactions'">
                <transactions-view></transactions-view>
            </div>

            <!-- Budgets View -->
            <div v-if="currentView === 'budgets'">
                <budgets-view></budgets-view>
            </div>
        </main>

        <!-- Export Modal -->
        <div v-if="showExportModal" class="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <h2>Export Data</h2>
                    <button @click="showExportModal = false" class="close-btn">❌</button>
                </div>

                <div class="modal-content">
                    <!-- PDF Report -->
                    <div class="export-section">
                        <h3>Monthly PDF Report</h3>
                        <div>
                            <select v-model="exportForm.month">
                                <option v-for="m in 12" :key="m" :value="m">{{ new Date(0, m-1).toLocaleString('default', { month: 'long' }) }}</option>
                            </select>
                            <select v-model="exportForm.year">
                                <option v-for="y in [2024, 2025, 2026, 2027]" :key="y" :value="y">{{ y }}</option>
                            </select>
                        </div>
                        <button @click="exportPdf">📄 Download PDF Report</button>
                    </div>

                    <!-- JSON Backup -->
                    <div class="export-section">
                        <h3>Full System Backup</h3>
                        <button @click="exportJson">💻 Download JSON Backup</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>

</html>
